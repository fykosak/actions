# Reusable deploy action that can be used in other repositories

on:
  workflow_call:
    inputs:
      deploy-url:
        required: true
        type: string
    secrets:
      token:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: Deploy
        run: |
          REQUEST_BODY=$(date --iso-8601=seconds)
          REQUEST_DIGEST=$(echo -n "$REQUEST_BODY" | openssl sha256 -hmac "${{ secrets.token }}" | sed -e 's/^.* //')
          curl "${{ inputs.deploy-url }}" \
            --request POST \
            --header "X-Hub-Signature-256: sha256=$REQUEST_DIGEST" \
            --header "Content-Type: text/plain" \
            --data "$REQUEST_BODY" \
            --no-progress-meter
